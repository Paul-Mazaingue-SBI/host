<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH — Ajouter un employé</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .widget {
    background: #ffffff;
    border: 1px solid #e2e0d8;
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .widget-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .icon {
    width: 40px;
    height: 40px;
    background: #e8f5ee;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .widget-title {
    font-size: 14px;
    font-weight: 600;
    color: #1a1916;
    letter-spacing: -0.01em;
  }

  .widget-sub {
    font-size: 12px;
    color: #8a8880;
    margin-top: 2px;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #2d6a4f;
    color: white;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    transition: background 0.15s;
  }

  .btn:hover { background: #235c43; }
</style>
</head>
<body>
  <div class="widget">
    <div class="widget-left">
      <div class="icon">👤</div>
      <div>
        <div class="widget-title">Gestion des employés</div>
        <div class="widget-sub">Créer ou mettre à jour une fiche RH</div>
      </div>
    </div>
    <a class="btn" href="https://votre-formulaire.tiiny.host" target="_blank">
      + Ajouter
    </a>
  </div>
</body>
</html>
